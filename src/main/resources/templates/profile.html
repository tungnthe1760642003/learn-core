<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile - LearnCore</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        .logo { font-size: 1.5rem; font-weight: 600; }
        .logout { color: #f43f5e; text-decoration: none; font-weight: 600; }
        
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary);
        }
        .info h1 { margin: 0 0 0.5rem 0; font-size: 2rem; }
        .info p { margin: 0; color: #94a3b8; font-size: 1.1rem; }
        .badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">LearnCore</div>
        <a th:href="@{/logout}" class="logout">Logout</a>
    </div>

    <div class="profile-container">
        <img th:src="${picture}" th:alt="${name}" class="avatar">
        <div class="info">
            <h1 th:text="${name}">User Name</h1>
            <p th:text="${email}">user@example.com</p>
            <div class="badge">Google Verified Profile</div>
        </div>
    </div>
</body>
</html>
