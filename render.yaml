services:
  - type: web
    name: learn-core-api
    env: docker
    plan: free
    region: singapore
    dockerFilePath: Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: learn-core-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: learn-core-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: learn-core-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: learn-core-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: learn-core-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SENTRY_DSN
        sync: false

databases:
  - name: learn-core-db
    plan: free
    region: singapore
